name: hello

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: hello-${{ github.ref }}
  cancel-in-progress: false

jobs:
  say_hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Echo
        run: echo "Hello from GitHub Actions"


