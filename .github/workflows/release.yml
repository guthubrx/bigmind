name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            FR: Publication basée sur le tag. Voir CHANGELOG et notes générées.

            EN: Release from tag. See CHANGELOG and generated notes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


